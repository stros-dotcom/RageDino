<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RAGE DINO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020202;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas {
    display: block;
    border: 1px solid #1a1a1a;
    box-shadow: 0 0 30px rgba(255,0,0,0.15);
    max-width: 100%;
    height: auto;
  }
  .ui {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #ff1111;
    font-size: 1.5rem;
    z-index: 10;
    pointer-events: none;
  }
  .score-row { display: flex; gap: 20px; }
  .rage-bar {
    width: 200px;
    height: 10px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 5px;
    overflow: hidden;
    margin-top: 4px;
  }
  .rage-fill {
    height: 100%;
    width: 0%;
    background: #ff1111;
    transition: width 0.1s linear;
  }
  .rage-label { font-size: 0.7rem; color: #aaa; letter-spacing: 1px; }
  .game-over-msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff1111;
    font-size: 2.8rem;
    font-weight: 700;
    text-align: center;
    display: none;
    z-index: 20;
    pointer-events: none;
  }
  .game-over-msg.active { display: block; }
  .restart-btn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: transparent;
    border: 2px solid #ff1111;
    color: #ff1111;
    padding: 14px 32px;
    font-family: inherit;
    font-size: 1.2rem;
    cursor: pointer;
    display: none;
    z-index: 20;
    transition: background 0.2s;
  }
  .restart-btn.active { display: block; }
  .restart-btn:hover { background: #200; }
  .top-buttons {
    position: fixed;
    top: 15px;
    right: 15px;
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .top-buttons button {
    background: #111;
    border: 2px solid #ff1111;
    color: #ff1111;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.4rem;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .top-buttons button:hover { background: #300; }
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.92);
    justify-content: center;
    align-items: center;
    z-index: 200;
  }
  .modal.active { display: flex; }
  .modal-content {
    background: #0a0a0a;
    border: 1px solid #ff1111;
    padding: 24px;
    width: 90%;
    max-width: 360px;
    max-height: 70vh;
    overflow-y: auto;
    border-radius: 4px;
  }
  .modal-content h2 {
    color: #ff1111;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    margin-bottom: 16px;
    text-align: center;
  }
  .close-modal {
    position: absolute;
    top: 8px;
    right: 16px;
    color: #ff1111;
    font-size: 2rem;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }
  .achievement-list, .shop-list { list-style: none; color: #ccc; font-size: 0.95rem; }
  .achievement-list li, .shop-list li {
    padding: 8px 0;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .shop-list button {
    background: #200;
    border: none;
    color: #ff1111;
    padding: 8px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
  }
  .shop-list button:disabled { opacity: 0.5; cursor: default; }
  .start-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #020202;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 500;
  }
  .start-btn {
    background: transparent;
    border: 2px solid #ff1111;
    color: #ff1111;
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.2rem;
    font-weight: 700;
    padding: 16px 48px;
    cursor: pointer;
    letter-spacing: 4px;
    transition: 0.2s;
  }
  .start-btn:hover { background: #200; }
  .start-subtitle {
    margin-top: 20px;
    color: #600;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
  }
  @media (max-width: 600px) {
    .ui { font-size: 1.2rem; top: 5px; }
    .game-over-msg { font-size: 2rem; }
    .restart-btn { padding: 12px 24px; font-size: 1rem; bottom: 20px; }
    .top-buttons { top: 10px; right: 10px; gap: 8px; }
    .top-buttons button { width: 42px; height: 42px; font-size: 1.2rem; }
    .start-btn { font-size: 1.8rem; padding: 14px 40px; }
  }
</style>
</head>
<body>
  <div class="start-screen" id="startScreen">
    <button class="start-btn" id="startBtn">СТАРТ</button>
    <div class="start-subtitle">RAGE DINO</div>
  </div>

  <div class="ui">
    <div class="score-row">
      <span id="score">0</span>
      <span id="highscore">Рекорд: 0</span>
    </div>
    <div class="rage-label">ЯРОСТЬ</div>
    <div class="rage-bar">
      <div class="rage-fill" id="rageFill"></div>
    </div>
  </div>
  <div class="top-buttons">
    <button id="achievementsBtn">🏆</button>
    <button id="shopBtn">🛒</button>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div class="game-over-msg" id="gameOverMsg">ЯРОСТЬ ПРЕРВАНА</div>
  <button class="restart-btn" id="restartBtn">ВОЗРОДИТЬСЯ</button>

  <div class="modal" id="achievementsModal">
    <div class="modal-content">
      <span class="close-modal" id="closeAchievements">&times;</span>
      <h2>ДОСТИЖЕНИЯ</h2>
      <ul class="achievement-list" id="achievementsList"></ul>
    </div>
  </div>

  <div class="modal" id="shopModal">
    <div class="modal-content">
      <span class="close-modal" id="closeShop">&times;</span>
      <h2>МАГАЗИН СКИНОВ</h2>
      <p style="color:#aaa; text-align:center; margin-bottom:15px;">Баланс: <span id="totalScore">0</span> очков</p>
      <ul class="shop-list" id="shopList"></ul>
    </div>
  </div>

<script>
  // ===== НАСТРОЙКА CANVAS =====
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 800;
  canvas.height = 300;

  function resize() {
    const maxWidth = window.innerWidth;
    const maxHeight = window.innerHeight;
    const scale = Math.min(maxWidth / canvas.width, maxHeight / canvas.height);
    canvas.style.width = canvas.width * scale + 'px';
    canvas.style.height = canvas.height * scale + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  // ===== АУДИО =====
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playSound(type) {
    if (!audioCtx) initAudio();
    const now = audioCtx.currentTime;
    if (type === 'jump') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.15);
    } else if (type === 'doublejump') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.12);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.15);
    } else if (type === 'rage') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.4);
      const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseData.length; i++) noiseData[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.2, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      noise.connect(noiseGain).connect(audioCtx.destination);
      noise.start(now);
    } else if (type === 'destroy') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(1000, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'death') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.5);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.6);
      const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
      const noiseDat = noiseBuf.getChannelData(0);
      for (let i = 0; i < noiseDat.length; i++) noiseDat[i] = Math.random() * 2 - 1;
      const noiseSrc = audioCtx.createBufferSource();
      noiseSrc.buffer = noiseBuf;
      const noiseGn = audioCtx.createGain();
      noiseGn.gain.setValueAtTime(0.15, now);
      noiseGn.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      noiseSrc.connect(noiseGn).connect(audioCtx.destination);
      noiseSrc.start(now);
    }
  }

  // ===== ПЕРЕМЕННЫЕ ИГРЫ =====
  let gameSpeed = 5;
  let score = 0;
  let highScore = localStorage.getItem('rageDinoHighScore') || 0;
  let isGameOver = false;
  let gameStarted = false;
  let frame = 0;
  let rageMeter = 0;
  const MAX_RAGE = 100;
  let rageActive = false;
  let rageTimer = 0;
  const RAGE_DURATION = 300;
  let doubleJumpAvailable = false;
  let deathParticles = [];
  let deathOverlayAlpha = 0;
  let boss = null;
  let bossSpawnScore = 300;
  let spawnTimer = 0;
  const spawnDelay = 90;

  // Скины
  let currentSkin = localStorage.getItem('dinoSkin') || 'classic';
  const skins = {
    classic: { name: 'Классический', color: '#ddd', price: 0, owned: true },
    blood: { name: 'Кровавый', color: '#ff4444', price: 50, owned: false },
    shadow: { name: 'Теневой', color: '#666', price: 200, owned: false },
    void: { name: 'Бездна', color: '#222', price: 500, owned: false }
  };
  let ownedSkins = JSON.parse(localStorage.getItem('ownedSkins')) || ['classic'];
  let totalScore = parseInt(localStorage.getItem('totalScore') || '0');
  function saveSkins() { localStorage.setItem('ownedSkins', JSON.stringify(ownedSkins)); localStorage.setItem('totalScore', totalScore); }

  // Динозавр
  const dino = {
    x: 60, y: 200, width: 30, height: 36,
    vy: 0, grounded: true,
    jumpPower: -9.5, gravity: 0.55,
    update() {
      this.vy += this.gravity;
      this.y += this.vy;
      if (this.y >= 200) {
        this.y = 200;
        this.vy = 0;
        if (!this.grounded) {
          this.grounded = true;
          doubleJumpAvailable = false;
        }
      } else {
        this.grounded = false;
      }
    },
    jump() {
      if (isGameOver || !gameStarted) return;
      initAudio();
      if (this.grounded) {
        this.vy = this.jumpPower;
        this.grounded = false;
        doubleJumpAvailable = true;
        playSound('jump');
        unlockAchievement('first_jump');
      } else if (doubleJumpAvailable) {
        this.vy = this.jumpPower * 0.75;
        doubleJumpAvailable = false;
        playSound('doublejump');
        unlockAchievement('double_jump');
      }
    },
    draw() {
      ctx.fillStyle = (rageActive && currentSkin === 'classic') ? '#ff4444' : skins[currentSkin].color;
      ctx.fillRect(this.x, this.y, 6, 6);
      ctx.fillRect(this.x + 8, this.y - 4, 4, 10);
      ctx.fillRect(this.x + 14, this.y - 2, 4, 8);
      ctx.fillRect(this.x + 4, this.y + 8, 18, 10);
      ctx.fillRect(this.x + 4, this.y + 20, 6, 10);
      ctx.fillRect(this.x + 14, this.y + 20, 6, 10);
      ctx.fillStyle = '#ff1111';
      ctx.fillRect(this.x + 18, this.y - 2, 3, 3);
    }
  };

  // Препятствия
  let obstacles = [];
  const OBSTACLE_W = 16, OBSTACLE_H = 28;
  function spawnObstacle() {
    obstacles.push({
      x: canvas.width,
      y: 200 + 36 - OBSTACLE_H,
      width: OBSTACLE_W,
      height: OBSTACLE_H,
      passed: false
    });
  }

  // Звёзды
  let stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 1,
      speed: Math.random() * 1.5 + 0.5
    });
  }

  function spawnBoss() {
    boss = {
      x: canvas.width,
      y: 200 + 36 - 50,
      width: 40,
      height: 50,
      health: 3,
      passed: false
    };
  }

  // ===== ОТРИСОВКА =====
  function drawGround() {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 240, canvas.width, 4);
    ctx.strokeStyle = '#ff1111';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, 238);
    ctx.lineTo(canvas.width, 238);
    ctx.stroke();
  }

  function drawStars() {
    for (let s of stars) {
      ctx.fillStyle = rageActive ? `rgba(255,0,0,${0.6 + Math.random()*0.4})` : `rgba(255,0,0,${0.3 + Math.random()*0.3})`;
      ctx.fillRect(s.x, s.y, s.size, s.size);
      s.x -= s.speed * (rageActive ? 2.5 : 1);
      if (s.x < 0) {
        s.x = canvas.width;
        s.y = Math.random() * canvas.height;
      }
    }
  }

  function drawObstacles() {
    ctx.fillStyle = '#ff1111';
    for (let obs of obstacles) {
      ctx.fillRect(obs.x, obs.y, 4, obs.height);
      ctx.fillRect(obs.x + 6, obs.y + 4, 4, obs.height - 8);
      ctx.fillRect(obs.x + 12, obs.y, 4, obs.height);
    }
  }

  function drawBoss() {
    if (!boss) return;
    const pulse = Math.sin(frame * 0.1) * 0.2 + 0.8;
    ctx.fillStyle = `rgba(255,0,0,${pulse})`;
    ctx.beginPath();
    ctx.arc(boss.x + boss.width/2, boss.y + boss.height/2, boss.width/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff4444';
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const sx = boss.x + boss.width/2 + Math.cos(angle) * (boss.width/2 + 6);
      const sy = boss.y + boss.height/2 + Math.sin(angle) * (boss.height/2 + 6);
      ctx.fillRect(sx - 2, sy - 2, 4, 4);
    }
    ctx.fillStyle = '#ff0000';
    ctx.font = '12px "JetBrains Mono"';
    ctx.fillText(`HP: ${boss.health}`, boss.x, boss.y - 5);
  }

  function drawDeathParticles() {
    for (let p of deathParticles) {
      ctx.fillStyle = `rgba(255,0,0,${p.alpha})`;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    if (deathOverlayAlpha > 0) {
      ctx.fillStyle = `rgba(180,0,0,${deathOverlayAlpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  // ===== ЛОГИКА =====
  function spawnDeathParticles() {
    const parts = [];
    for (let i = 0; i < 30; i++) {
      parts.push({
        x: dino.x + Math.random() * dino.width,
        y: dino.y + Math.random() * dino.height,
        size: Math.random() * 6 + 2,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 1) * 3,
        alpha: 1
      });
    }
    return parts;
  }

  function updateDeathParticles() {
    for (let p of deathParticles) {
      p.x += p.vx;
      p.y += p.vy;
      p.alpha -= 0.02;
    }
    deathParticles = deathParticles.filter(p => p.alpha > 0);
    if (deathOverlayAlpha < 0.6 && deathParticles.length === 0) {
      deathOverlayAlpha = Math.min(0.6, deathOverlayAlpha + 0.01);
    }
  }

  function activateRage() {
    if (rageActive) return;
    rageActive = true;
    rageTimer = RAGE_DURATION;
    rageMeter = 0;
    updateRageBar();
    playSound('rage');
    unlockAchievement('rage_activated');
  }

  function deactivateRage() { rageActive = false; }
  function updateRageBar() { document.getElementById('rageFill').style.width = rageMeter + '%'; }
  function addRage(amount) {
    if (rageActive) return;
    rageMeter = Math.min(MAX_RAGE, rageMeter + amount);
    updateRageBar();
    if (rageMeter >= MAX_RAGE) activateRage();
  }

  function update() {
    if (isGameOver || !gameStarted) return;
    frame++;
    dino.update();

    if (rageActive) {
      rageTimer--;
      if (rageTimer <= 0) deactivateRage();
    }

    spawnTimer++;
    if (spawnTimer > spawnDelay) {
      spawnTimer = 0;
      spawnObstacle();
    }

    if (!boss && score >= bossSpawnScore) {
      spawnBoss();
      bossSpawnScore += 300;
    }

    for (let obs of obstacles) {
      obs.x -= gameSpeed;
      if (!obs.passed && obs.x + obs.width < dino.x) {
        obs.passed = true;
        score += rageActive ? 20 : 10;
        totalScore += rageActive ? 20 : 10;
        saveSkins();
        addRage(3);
        updateScore();
        checkAchievements();
      }
    }
    obstacles = obstacles.filter(obs => obs.x + obs.width > 0);

    if (boss) {
      boss.x -= gameSpeed * 0.6;
      if (boss.x + boss.width < 0) boss = null;
    }

    for (let obs of obstacles) {
      if (rectCollide(dino.x, dino.y, dino.width, dino.height, obs.x, obs.y, obs.width, obs.height)) {
        if (rageActive) {
          obstacles = obstacles.filter(o => o !== obs);
          addRage(5);
          playSound('destroy');
          continue;
        }
        gameOver();
        return;
      }
    }

    if (boss && rectCollide(dino.x, dino.y, dino.width, dino.height, boss.x, boss.y, boss.width, boss.height)) {
      if (rageActive) {
        boss.health--;
        playSound('destroy');
        if (boss.health <= 0) {
          boss = null;
          score += 100;
          totalScore += 100;
          updateScore();
          addRage(20);
        }
      } else {
        gameOver();
        return;
      }
    }

    gameSpeed += 0.001;
  }

  function rectCollide(x1,y1,w1,h1, x2,y2,w2,h2) {
    return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
  }

  function updateScore() { document.getElementById('score').textContent = score; }

  function gameOver() {
    isGameOver = true;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('rageDinoHighScore', highScore);
      document.getElementById('highscore').textContent = 'Рекорд: ' + highScore;
    }
    deathParticles = spawnDeathParticles();
    deathOverlayAlpha = 0;
    document.getElementById('gameOverMsg').classList.add('active');
    document.getElementById('restartBtn').classList.add('active');
    playSound('death');
  }

  function restart() {
    score = 0;
    gameSpeed = 5;
    obstacles = [];
    spawnTimer = 0;
    isGameOver = false;
    dino.y = 200;
    dino.vy = 0;
    dino.grounded = true;
    doubleJumpAvailable = false;
    rageMeter = 0;
    rageActive = false;
    rageTimer = 0;
    deathParticles = [];
    deathOverlayAlpha = 0;
    boss = null;
    bossSpawnScore = 300;
    updateScore();
    updateRageBar();
    document.getElementById('gameOverMsg').classList.remove('active');
    document.getElementById('restartBtn').classList.remove('active');
  }

  // ===== ДОСТИЖЕНИЯ =====
  const achievements = [
    { id: 'first_jump', name: 'Первый прыжок', desc: 'Совершить прыжок', unlocked: false },
    { id: 'double_jump', name: 'Двойной прыжок', desc: 'Использовать двойной прыжок', unlocked: false },
    { id: 'rage_activated', name: 'Ярость', desc: 'Активировать режим ярости', unlocked: false },
    { id: 'score_100', name: 'Сотня', desc: 'Набрать 100 очков', unlocked: false },
    { id: 'score_500', name: 'Пятьсот', desc: 'Набрать 500 очков', unlocked: false },
    { id: 'score_1000', name: 'Тысяча', desc: 'Набрать 1000 очков', unlocked: false }
  ];
  let unlockedAchievements = JSON.parse(localStorage.getItem('achievements')) || [];
  function unlockAchievement(id) {
    if (unlockedAchievements.includes(id)) return;
    unlockedAchievements.push(id);
    localStorage.setItem('achievements', JSON.stringify(unlockedAchievements));
  }
  function checkAchievements() {
    if (score >= 100) unlockAchievement('score_100');
    if (score >= 500) unlockAchievement('score_500');
    if (score >= 1000) unlockAchievement('score_1000');
  }
  function renderAchievements() {
    const list = document.getElementById('achievementsList');
    list.innerHTML = '';
    achievements.forEach(a => {
      const unlocked = unlockedAchievements.includes(a.id);
      const li = document.createElement('li');
      li.innerHTML = `${unlocked ? '✅' : '⬛'} ${a.name} - ${a.desc}`;
      list.appendChild(li);
    });
  }

  // ===== МАГАЗИН =====
  function updateShopUI() {
    const shopList = document.getElementById('shopList');
    document.getElementById('totalScore').textContent = totalScore;
    shopList.innerHTML = '';
    for (let [key, skin] of Object.entries(skins)) {
      const li = document.createElement('li');
      li.innerHTML = `<span>${skin.name} (${skin.color})</span>`;
      const btn = document.createElement('button');
      if (ownedSkins.includes(key)) {
        if (currentSkin === key) {
          btn.textContent = 'Выбрано';
          btn.disabled = true;
        } else {
          btn.textContent = 'Выбрать';
          btn.onclick = () => {
            currentSkin = key;
            localStorage.setItem('dinoSkin', key);
            updateShopUI();
          };
        }
      } else {
        btn.textContent = `Купить (${skin.price})`;
        if (totalScore >= skin.price) {
          btn.onclick = () => {
            totalScore -= skin.price;
            ownedSkins.push(key);
            saveSkins();
            updateShopUI();
          };
        } else {
          btn.disabled = true;
        }
      }
      li.appendChild(btn);
      shopList.appendChild(li);
    }
  }

  // ===== УПРАВЛЕНИЕ МОДАЛКАМИ =====
  document.getElementById('achievementsBtn').onclick = () => {
    document.getElementById('achievementsModal').classList.add('active');
    renderAchievements();
  };
  document.getElementById('closeAchievements').onclick = () => document.getElementById('achievementsModal').classList.remove('active');
  document.getElementById('shopBtn').onclick = () => {
    document.getElementById('shopModal').classList.add('active');
    updateShopUI();
  };
  document.getElementById('closeShop').onclick = () => document.getElementById('shopModal').classList.remove('active');

  // ===== УПРАВЛЕНИЕ ИГРОЙ =====
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      dino.jump();
    }
  });
  canvas.addEventListener('click', () => dino.jump());
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    dino.jump();
  });
  document.getElementById('restartBtn').addEventListener('click', restart);

  // ===== СТАРТ =====
  document.getElementById('startBtn').onclick = () => {
    document.getElementById('startScreen').style.display = 'none';
    gameStarted = true;
    initAudio();
  };

  // ===== ГЛАВНЫЙ ЦИКЛ =====
  function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (rageActive) {
      ctx.fillStyle = '#0a0000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    drawStars();
    drawGround();
    drawObstacles();
    drawBoss();
    dino.draw();
    drawDeathParticles();
    update();
    requestAnimationFrame(gameLoop);
  }

  document.getElementById('highscore').textContent = 'Рекорд: ' + highScore;
  updateRageBar();
  gameLoop();
</script>
</body>
</html>
